<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary -->
    <title>Apex · AI Trading Terminal</title>
    <meta name="description" content="Real-time crypto trading terminal with AI-powered predictions for BTC, ETH and SOL. Live charts, news feed, and simulated portfolio tracking." />
    <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph (Facebook / LinkedIn / WhatsApp / Telegram) -->
    <meta property="og:type"         content="website" />
    <meta property="og:url"          content="https://apex-ai-terminal.vercel.app" />
    <meta property="og:title"        content="Apex · AI Trading Terminal" />
    <meta property="og:description"  content="Real-time BTC, ETH &amp; SOL charts with AI signal predictions, live news, Fear &amp; Greed, and a simulated portfolio. No sign-up required." />
    <meta property="og:image"        content="https://apex-ai-terminal.vercel.app/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter / X card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Apex · AI Trading Terminal" />
    <meta name="twitter:description" content="Real-time BTC, ETH &amp; SOL charts with AI signal predictions, live news, Fear &amp; Greed, and a simulated portfolio." />
    <meta name="twitter:image"       content="https://apex-ai-terminal.vercel.app/og-image.png" />

    <!-- iOS PWA feel -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Apex" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
